name: Commit Lint

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  lint:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine commit range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            BASE="${{ github.event.before }}"
            # New branch: before is all zeros — start from the first commit reachable from HEAD
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="$(git rev-list --max-parents=0 HEAD)"
            fi
            echo "base=$BASE"                >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}"    >> "$GITHUB_OUTPUT"
          fi

      - name: Lint each commit message
        run: |
          chmod +x .githooks/commit-msg
          BASE="${{ steps.range.outputs.base }}"
          HEAD="${{ steps.range.outputs.head }}"

          FAILED=0
          while IFS= read -r msg; do
            printf '%s' "$msg" > /tmp/_commit_msg
            if ! .githooks/commit-msg /tmp/_commit_msg; then
              FAILED=1
            fi
          done < <(git log --format='%s' "${BASE}..${HEAD}")

          exit "$FAILED"
